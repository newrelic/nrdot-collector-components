name: Source Code - Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create release for (e.g., v0.141.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grant write permissions to repository contents
    steps:
      - name: Check if release exists
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if gh release view "$TAG" --repo ${{ github.repository }} &>/dev/null; then
            echo "Release for $TAG already exists, skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Checkout Repo
        if: steps.check-release.outputs.exists == 'false'
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0
      
      - run: ./.github/workflows/scripts/free-disk-space.sh
      - run: |
          cp ../configs/build-and-test/package.json .
          cp ../configs/build-and-test/package-lock.json .
          npm ci
        working-directory: ./.github/workflows/scripts

      - name: Prepare release notes
        env:
          RELEASE_TAG: ${{ steps.check-release.outputs.tag }}
        run: ./.github/workflows/scripts/prepare-release-notes.sh

      - name: Create Github Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.check-release.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" -t "$RELEASE_TAG" -F ${{ env.RELEASE_NOTES }}
        
      - name: Send failure notification to Slack
        if: failure()
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.OTELCOMM_BOTS_SLACK_HOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: ":rotating_light: sourcecode-release workflow failed - https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} :rotating_light:"