name: Source Code - Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create release for (e.g., v0.141.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grant write permissions to repository contents
    steps:
      - name: Check if release exists
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if gh release view "$TAG" --repo ${{ github.repository }} &>/dev/null; then
            echo "Error: release for $TAG already exists"
            exit 1
          fi

      - name: Checkout Repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ steps.check-release.outputs.tag }}
          fetch-depth: 0
      
      - run: |
          cp ../configs/build-and-test/package.json .
          cp ../configs/build-and-test/package-lock.json .
          npm ci
        working-directory: ./.github/workflows/scripts

      - name: Prepare release notes
        env:
          RELEASE_TAG: ${{ steps.check-release.outputs.tag }}
        run: ./.github/workflows/scripts/prepare-release-notes.sh

      - name: Create Github Release
        if: ${{ !env.ACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.check-release.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" -t "$RELEASE_TAG" -F release-notes.md
        
      - name: Send failure notification to Slack
        if: ${{ failure() && !env.ACT }}
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          webhook: ${{ secrets.OTELCOMM_BOTS_SLACK_HOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: ":rotating_light: sourcecode-release workflow failed - https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} :rotating_light:"
